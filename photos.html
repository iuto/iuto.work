  <script src="likes-config.js"></script>
  <script>
    const photoGrid = document.querySelector(".photo-grid");
    const photoCards = [...document.querySelectorAll(".photo-card")];
    const photoDialog = document.getElementById("photo-dialog");
    const photoDialogMedia = document.getElementById("photo-dialog-media");
    const photoDialogTags = document.getElementById("photo-dialog-tags");
    const photoDetailCamera = document.getElementById("photo-detail-camera");
    const photoDetailLens = document.getElementById("photo-detail-lens");
    const photoDetailExif = document.getElementById("photo-detail-exif");
    const photoDetailDate = document.getElementById("photo-detail-date");
    const photoMapLink = document.getElementById("photo-map-link");
    const photoMapIcon = document.getElementById("photo-map-icon");
    const photoMapPlace = document.getElementById("photo-map-place");
    const photoDialogLike = document.getElementById("photo-dialog-like");
    const photoLikeCount = document.getElementById("photo-like-count");
    const likesConfig = window.IUTO_LIKES_CONFIG || {};
    const hasSharedLikes = Boolean(likesConfig.supabaseUrl && likesConfig.supabaseAnonKey);
    const likeStore = {
      localKey: "photoLikeCounts",
      getLocalCounts() {
        try {
          return JSON.parse(localStorage.getItem(this.localKey) || "{}");
        } catch {
          return {};
        }
      },
      setLocalCount(photoId, count) {
        const counts = this.getLocalCounts();
        counts[photoId] = count;
        localStorage.setItem(this.localKey, JSON.stringify(counts));
      },
      headers() {
        return {
          apikey: likesConfig.supabaseAnonKey,
          Authorization: `Bearer ${likesConfig.supabaseAnonKey}`,
          "Content-Type": "application/json"
        };
      },
      async get(photoId) {
        if (!hasSharedLikes) return this.getLocalCounts()[photoId] || 0;

        const params = new URLSearchParams({
          photo_id: `eq.${photoId}`,
          select: "count"
        });
        const response = await fetch(`${likesConfig.supabaseUrl}/rest/v1/photo_likes?${params}`, {
          headers: this.headers()
        });

        if (!response.ok) throw new Error("Could not load shared likes");
        const rows = await response.json();
        return rows[0]?.count || 0;
      },
      async increment(photoId) {
        if (!hasSharedLikes) {
          const nextCount = (this.getLocalCounts()[photoId] || 0) + 1;
          this.setLocalCount(photoId, nextCount);
          return nextCount;
        }

        const response = await fetch(`${likesConfig.supabaseUrl}/rest/v1/rpc/increment_photo_like`, {
          method: "POST",
          headers: this.headers(),
          body: JSON.stringify({ photo_key: photoId })
        });

        if (!response.ok) throw new Error("Could not save shared like");
        return response.json();
      }
    };
    let activeTag = "";
    let activePhotoId = "";
    let currentLikeRequest = 0;

    const shufflePhotoCards = () => {
      if (!photoGrid) return;

      const shuffledCards = [...photoCards];
      for (let index = shuffledCards.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [shuffledCards[index], shuffledCards[randomIndex]] = [shuffledCards[randomIndex], shuffledCards[index]];
      }

      shuffledCards.forEach((card) => photoGrid.append(card));
    };

    shufflePhotoCards();

    document.querySelectorAll("[data-photo-scroll]").forEach((button) => {
      button.addEventListener("click", () => {
        if (!photoGrid) return;

        const card = photoGrid.querySelector(".photo-card:not(.is-hidden)") || photoGrid.querySelector(".photo-card");
        const gap = parseFloat(getComputedStyle(photoGrid).columnGap) || 18;
        const distance = card ? card.getBoundingClientRect().width + gap : 340;
        const direction = button.dataset.photoScroll === "next" ? 1 : -1;

        photoGrid.scrollBy({
          left: direction * distance,
          behavior: "smooth"
        });
      });
    });

    const tagLabel = {
      animal: "&#21205;&#29289;",
      park: "&#20844;&#22290;",
      airplane: "&#39131;&#34892;&#27231;",
      aquarium: "&#27700;&#26063;&#39208;",
      building: "&#24314;&#29289;",
    };

    const setActiveTag = (tag) => {
      activeTag = activeTag === tag ? "" : tag;

      photoCards.forEach((card) => {
        const tags = card.dataset.tags?.split(" ") || [];
        card.classList.toggle("is-hidden", Boolean(activeTag) && !tags.includes(activeTag));
      });

      document.querySelectorAll(".photo-tag").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.tag === activeTag);
      });

      photoGrid?.scrollTo({ left: 0, behavior: "smooth" });
    };

    document.querySelectorAll(".photo-tag").forEach((button) => {
      button.addEventListener("click", () => setActiveTag(button.dataset.tag));
    });

    const openPhotoDialog = (card) => {
      if (!photoDialog) return;

      const src = card.dataset.src;
      activePhotoId = src ? src.split("/").pop().replace(/\.[^.]+$/, "") : "";
      photoDialogMedia.innerHTML = src
        ? `<img src="${src}" alt="">`
        : `<div class="photo-dialog-placeholder">Details not added yet</div>`;

      const setDetail = (key, element, value) => {
        const row = document.querySelector(`[data-detail-row="${key}"]`);
        const shouldShow = value && value !== "-" && value !== "Location TBD";
        row.hidden = !shouldShow;
        element.textContent = shouldShow ? value : "";
      };

      setDetail("camera", photoDetailCamera, card.dataset.camera);
      setDetail("lens", photoDetailLens, card.dataset.lens);
      setDetail("exif", photoDetailExif, card.dataset.exif);
      setDetail("date", photoDetailDate, card.dataset.date);

      const hasMap = card.dataset.place && card.dataset.map;
      photoMapLink.hidden = !hasMap;
      if (hasMap) {
        photoMapLink.href = card.dataset.map;
        photoMapIcon.textContent = card.dataset.mapIcon || "📍";
        photoMapPlace.textContent = card.dataset.place;
      }

      photoDialogTags.innerHTML = "";
      (card.dataset.tags?.split(" ") || []).forEach((tag) => {
        const button = document.createElement("button");
        button.className = "photo-tag";
        button.type = "button";
        button.dataset.tag = tag;
        button.innerHTML = `#${tagLabel[tag] || tag}`;
        button.addEventListener("click", () => {
          photoDialog.close();
          setActiveTag(tag);
        });
        photoDialogTags.append(button);
      });

      syncDialogLike();
      photoDialog.showModal();
    };

    document.querySelectorAll(".photo-open").forEach((button) => {
      button.addEventListener("click", () => {
        openPhotoDialog(button.closest(".photo-card"));
      });
    });

    const renderLikeCount = (count) => {
      photoDialogLike.classList.toggle("is-liked", count > 0);
      photoDialogLike.querySelector("span").innerHTML = "&#9829;";
      photoLikeCount.textContent = count.toLocaleString();
    };

    const syncDialogLike = async () => {
      if (!photoDialogLike || !activePhotoId) return;

      const requestId = ++currentLikeRequest;
      photoDialogLike.disabled = true;
      photoDialogLike.classList.add("is-loading");

      try {
        const count = await likeStore.get(activePhotoId);
        if (requestId === currentLikeRequest) renderLikeCount(count);
      } catch {
        const count = likeStore.getLocalCounts()[activePhotoId] || 0;
        renderLikeCount(count);
      } finally {
        if (requestId === currentLikeRequest) {
          photoDialogLike.disabled = false;
          photoDialogLike.classList.remove("is-loading");
        }
      }
    };

    photoDialogLike?.addEventListener("click", async () => {
      if (!activePhotoId) return;

      photoDialogLike.classList.remove("is-popping");
      void photoDialogLike.offsetWidth;
      photoDialogLike.classList.add("is-popping");

      try {
        const nextCount = await likeStore.increment(activePhotoId);
        renderLikeCount(nextCount);
      } catch {
        const nextCount = (likeStore.getLocalCounts()[activePhotoId] || 0) + 1;
        likeStore.setLocalCount(activePhotoId, nextCount);
        renderLikeCount(nextCount);
      }
    });

    document.querySelector("[data-photo-dialog-close]")?.addEventListener("click", () => {
      photoDialog?.close();
    });

    photoDialog?.addEventListener("click", (event) => {
      if (event.target === photoDialog) photoDialog.close();
    });
  </script>
