<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Health | iuto</title>
  <meta name="description" content="iutoのGalaxy Watchヘルスデータを表示するページです。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <main class="page">
    <nav class="nav">
      <div class="nav-links">
        <a href="index.html" aria-label="Home" title="Home">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4" />
            <path d="M5 21a7 7 0 0 1 14 0" />
          </svg>
        </a>
        <a class="nav-camera" href="photos.html" aria-label="Camera" title="Camera">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 8.5h3.4L9.2 6h5.6l1.8 2.5H20a1.5 1.5 0 0 1 1.5 1.5v8A1.5 1.5 0 0 1 20 19.5H4A1.5 1.5 0 0 1 2.5 18v-8A1.5 1.5 0 0 1 4 8.5Z" />
            <circle cx="12" cy="14" r="3.2" />
            <circle cx="18" cy="11" r="1" />
          </svg>
        </a>
        <a class="is-current nav-health" href="health.html" aria-current="page" aria-label="Health" title="Health">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.8 4.9a5.5 5.5 0 0 0-7.8 0L12 5.9l-1-1a5.5 5.5 0 0 0-7.8 7.8L12 21.5l8.8-8.8a5.5 5.5 0 0 0 0-7.8Z" />
            <path d="M7.2 12h2.2l1.1-2.4 2.1 5.2 1.4-2.8h2.8" />
          </svg>
        </a>
      </div>
    </nav>

    <section class="health-page-hero glass" aria-labelledby="health-title">
      <div>
        <p class="health-kicker">Galaxy Watch</p>
        <h1 id="health-title">Health</h1>
      </div>
      <span class="health-status" id="health-status">Sync pending</span>
    </section>

    <section class="section health-section" aria-label="Health data">
      <div class="health-card glass">
        <div class="health-grid" aria-live="polite">
          <article class="health-metric">
            <span class="health-icon" aria-hidden="true">👟</span>
            <span class="health-label">&#27497;&#25968;</span>
            <strong id="health-steps">--</strong>
          </article>
          <article class="health-metric">
            <span class="health-icon" aria-hidden="true">📍</span>
            <span class="health-label">&#36317;&#38626;</span>
            <strong id="health-distance">--</strong>
          </article>
          <article class="health-metric">
            <span class="health-icon" aria-hidden="true">☾</span>
            <span class="health-label">&#30561;&#30496;</span>
            <strong id="health-sleep">--</strong>
          </article>
          <article class="health-metric">
            <span class="health-icon" aria-hidden="true">&#10022;</span>
            <span class="health-label">&#28145;&#12356;&#30561;&#30496;</span>
            <strong id="health-deep">--</strong>
          </article>
        </div>

        <p class="health-updated" id="health-updated">Health Connect auto sync will appear here.</p>
      </div>
    </section>

    <section class="section health-sleep-section" aria-labelledby="sleep-detail-title">
      <div class="health-sleep-card glass">
        <div class="health-chart-head">
          <div>
            <p class="health-kicker">Sleep detail</p>
            <h2 id="sleep-detail-title">Sleep rhythm</h2>
          </div>
        </div>

        <div class="sleep-detail-grid">
          <article class="sleep-detail-item">
            <span>寝た時間</span>
            <strong id="sleep-start">--</strong>
          </article>
          <article class="sleep-detail-item">
            <span>起きた時間</span>
            <strong id="sleep-end">--</strong>
          </article>
          <article class="sleep-detail-item">
            <span>入眠潜時</span>
            <strong id="sleep-latency">--</strong>
          </article>
        </div>

        <div class="sleep-stage-card">
          <div class="sleep-stage-head">
            <span>睡眠ステージ</span>
            <strong id="sleep-stage-total">--</strong>
          </div>
          <div class="sleep-stage-bar" id="sleep-stage-bar" aria-label="Sleep stage breakdown"></div>
          <div class="sleep-stage-legend" id="sleep-stage-legend"></div>
        </div>
      </div>
    </section>

    <section class="section health-chart-section" aria-labelledby="health-chart-title">
      <div class="health-chart-card glass">
        <div class="health-chart-head">
          <div>
            <p class="health-kicker">Last 30 days</p>
            <h2 id="health-chart-title">Daily trend</h2>
          </div>
          <div class="health-chart-tabs" aria-label="Chart metric">
            <button class="is-active" type="button" data-health-chart="steps">歩数</button>
            <button type="button" data-health-chart="distance">距離</button>
            <button type="button" data-health-chart="sleep">睡眠</button>
          </div>
        </div>
        <div class="health-chart-wrap">
          <svg class="health-chart" id="health-chart" viewBox="0 0 720 260" role="img" aria-label="Health trend chart"></svg>
        </div>
        <div class="health-chart-summary" id="health-chart-summary">Daily sync history will appear here.</div>
      </div>
    </section>
  </main>

  <script src="health-config.js"></script>
  <script>
    const healthConfig = window.IUTO_HEALTH_CONFIG || {};
    const healthStatus = document.getElementById("health-status");
    const healthSteps = document.getElementById("health-steps");
    const healthDistance = document.getElementById("health-distance");
    const healthSleep = document.getElementById("health-sleep");
    const healthDeep = document.getElementById("health-deep");
    const healthUpdated = document.getElementById("health-updated");
    const sleepStart = document.getElementById("sleep-start");
    const sleepEnd = document.getElementById("sleep-end");
    const sleepLatency = document.getElementById("sleep-latency");
    const sleepStageTotal = document.getElementById("sleep-stage-total");
    const sleepStageBar = document.getElementById("sleep-stage-bar");
    const sleepStageLegend = document.getElementById("sleep-stage-legend");
    const healthChart = document.getElementById("health-chart");
    const healthChartSummary = document.getElementById("health-chart-summary");
    const healthChartButtons = [...document.querySelectorAll("[data-health-chart]")];
    const numberFormatter = new Intl.NumberFormat("ja-JP");
    let healthRows = [];
    let activeChartMetric = "steps";

    const setHealthStatus = (text, state = "pending") => {
      if (!healthStatus) return;
      healthStatus.textContent = text;
      healthStatus.dataset.state = state;
    };

    const formatSleep = (minutes) => {
      if (!Number.isFinite(minutes)) return "--";
      const hours = Math.floor(minutes / 60);
      const mins = Math.round(minutes % 60);
      return `${hours}h ${mins}m`;
    };

    const formatMinutes = (minutes) => {
      if (!Number.isFinite(minutes)) return "--";
      if (minutes < 60) return `${Math.round(minutes)}m`;
      return formatSleep(minutes);
    };

    const formatClock = (value) => {
      if (!value) return "--";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "--";
      return date.toLocaleTimeString("ja-JP", {
        hour: "2-digit",
        minute: "2-digit"
      });
    };

    const formatHealthDate = (value) => {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("ja-JP", {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    };

    const formatShortDate = (value) => {
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return `${date.getMonth() + 1}/${date.getDate()}`;
    };

    const getMetricValue = (row, metric) => {
      if (metric === "distance") return Number(row.distance_m) / 1000;
      if (metric === "sleep") return Number(row.sleep_minutes) / 60;
      return Number(row.steps);
    };

    const formatMetricValue = (value, metric) => {
      if (!Number.isFinite(value)) return "--";
      if (metric === "distance") return `${value.toFixed(2)} km`;
      if (metric === "sleep") return `${value.toFixed(1)} h`;
      return numberFormatter.format(Math.round(value));
    };

    const metricLabels = {
      steps: "歩数",
      distance: "距離",
      sleep: "睡眠"
    };

    const renderSleepStages = (latest) => {
      if (!sleepStageBar || !sleepStageLegend) return;
      const stages = [
        { key: "deep_sleep_minutes", label: "深い", className: "is-deep" },
        { key: "rem_sleep_minutes", label: "REM", className: "is-rem" },
        { key: "light_sleep_minutes", label: "浅い", className: "is-light" },
        { key: "awake_minutes", label: "覚醒", className: "is-awake" }
      ].map((stage) => ({
        ...stage,
        value: Number(latest?.[stage.key])
      })).filter((stage) => Number.isFinite(stage.value) && stage.value > 0);

      sleepStageBar.innerHTML = "";
      sleepStageLegend.innerHTML = "";

      const total = stages.reduce((sum, stage) => sum + stage.value, 0);
      sleepStageTotal.textContent = Number.isFinite(total) && total > 0 ? formatSleep(total) : "--";

      if (!total) {
        sleepStageBar.innerHTML = '<span class="sleep-stage-empty">No stage data yet</span>';
        return;
      }

      stages.forEach((stage) => {
        const segment = document.createElement("span");
        segment.className = `sleep-stage-segment ${stage.className}`;
        segment.style.width = `${Math.max((stage.value / total) * 100, 4)}%`;
        segment.title = `${stage.label}: ${formatMinutes(stage.value)}`;
        sleepStageBar.append(segment);

        const item = document.createElement("span");
        item.className = `sleep-stage-label ${stage.className}`;
        item.innerHTML = `<i></i>${stage.label} ${formatMinutes(stage.value)}`;
        sleepStageLegend.append(item);
      });
    };

    const renderHealthChart = () => {
      if (!healthChart || !healthChartSummary) return;
      healthChart.innerHTML = "";

      const rows = healthRows
        .map((row) => ({
          date: row.date,
          value: getMetricValue(row, activeChartMetric)
        }))
        .filter((row) => Number.isFinite(row.value));

      if (!rows.length) {
        healthChartSummary.textContent = "No chart data yet.";
        return;
      }

      const width = 720;
      const height = 260;
      const padding = { top: 24, right: 18, bottom: 38, left: 46 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;
      const maxValue = Math.max(...rows.map((row) => row.value), 1);
      const average = rows.reduce((sum, row) => sum + row.value, 0) / rows.length;
      const points = rows.map((row, index) => {
        const x = rows.length === 1
          ? padding.left + chartWidth
          : padding.left + (chartWidth / (rows.length - 1)) * index;
        const y = padding.top + chartHeight - (row.value / maxValue) * chartHeight;
        return { ...row, x, y };
      });
      const path = points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
      const areaPath = `${path} L ${points[points.length - 1].x.toFixed(2)} ${padding.top + chartHeight} L ${points[0].x.toFixed(2)} ${padding.top + chartHeight} Z`;
      const gridValues = [0.25, 0.5, 0.75, 1];

      const makeSvg = (tag, attrs = {}) => {
        const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
        Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
        return element;
      };

      const defs = makeSvg("defs");
      const gradient = makeSvg("linearGradient", {
        id: "health-chart-gradient",
        x1: "0",
        y1: "0",
        x2: "0",
        y2: "1"
      });
      [
        ["0%", "0.34"],
        ["58%", "0.12"],
        ["100%", "0"]
      ].forEach(([offset, opacity]) => {
        gradient.append(makeSvg("stop", {
          offset,
          "stop-color": "#ffbd5b",
          "stop-opacity": opacity
        }));
      });
      defs.append(gradient);
      healthChart.append(defs);

      gridValues.forEach((ratio) => {
        const y = padding.top + chartHeight - chartHeight * ratio;
        healthChart.append(makeSvg("line", {
          x1: padding.left,
          x2: width - padding.right,
          y1: y,
          y2: y,
          class: "health-chart-grid"
        }));
      });

      healthChart.append(makeSvg("path", {
        d: areaPath,
        class: "health-chart-area"
      }));
      healthChart.append(makeSvg("path", {
        d: path,
        class: "health-chart-line"
      }));

      points.forEach((point) => {
        healthChart.append(makeSvg("circle", {
          cx: point.x,
          cy: point.y,
          r: 4.8,
          class: "health-chart-dot"
        }));
        const title = makeSvg("title");
        title.textContent = `${point.date}: ${formatMetricValue(point.value, activeChartMetric)}`;
        healthChart.lastElementChild.append(title);
      });

      const firstDate = points[0].date;
      const lastDate = points[points.length - 1].date;
      [
        { text: formatShortDate(firstDate), x: padding.left, anchor: "start" },
        { text: formatShortDate(lastDate), x: width - padding.right, anchor: "end" }
      ].forEach((label) => {
        const text = makeSvg("text", {
          x: label.x,
          y: height - 12,
          class: "health-chart-axis",
          "text-anchor": label.anchor
        });
        text.textContent = label.text;
        healthChart.append(text);
      });

      const maxText = makeSvg("text", {
        x: padding.left,
        y: 16,
        class: "health-chart-axis"
      });
      maxText.textContent = formatMetricValue(maxValue, activeChartMetric);
      healthChart.append(maxText);

      healthChartSummary.textContent =
        `${metricLabels[activeChartMetric]} / ${rows.length} days / Avg ${formatMetricValue(average, activeChartMetric)}`;
    };

    const loadHealthData = async () => {
      if (!healthConfig.supabaseUrl || !healthConfig.supabaseAnonKey) {
        setHealthStatus("Setup pending");
        return;
      }

      try {
        setHealthStatus("Syncing...");
        const tableName = healthConfig.tableName || "health_daily";
        const endpoint = `${healthConfig.supabaseUrl}/rest/v1/${tableName}?select=*&order=date.desc&limit=30`;
        const response = await fetch(endpoint, {
          headers: {
            apikey: healthConfig.supabaseAnonKey,
            Authorization: `Bearer ${healthConfig.supabaseAnonKey}`
          }
        });

        if (!response.ok) throw new Error("Could not load health data");

        const rows = await response.json();
        healthRows = [...rows].reverse();
        const latest = rows[0];
        if (!latest) {
          setHealthStatus("No data yet");
          return;
        }

        const steps = Number(latest.steps);
        const distanceM = Number(latest.distance_m);
        const sleepMinutes = Number(latest.sleep_minutes);
        const deepMinutes = Number(latest.deep_sleep_minutes);
        const latencyMinutes = Number(latest.sleep_latency_minutes);

        healthSteps.textContent = Number.isFinite(steps)
          ? numberFormatter.format(steps)
          : "--";
        healthDistance.textContent = Number.isFinite(distanceM)
          ? `${(distanceM / 1000).toFixed(2)} km`
          : "--";
        healthSleep.textContent = formatSleep(sleepMinutes);
        healthDeep.textContent = formatMinutes(deepMinutes);
        sleepStart.textContent = formatClock(latest.sleep_start_at);
        sleepEnd.textContent = formatClock(latest.sleep_end_at);
        sleepLatency.textContent = Number.isFinite(latencyMinutes)
          ? formatMinutes(latencyMinutes)
          : "記録なし";
        renderSleepStages(latest);

        healthUpdated.textContent = `${latest.date} / Updated ${formatHealthDate(latest.updated_at)}`;
        renderHealthChart();
        setHealthStatus("Live", "live");
      } catch (error) {
        setHealthStatus("Offline", "error");
        healthUpdated.textContent = "Health data could not be loaded.";
      }
    };

    healthChartButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeChartMetric = button.dataset.healthChart;
        healthChartButtons.forEach((item) => item.classList.toggle("is-active", item === button));
        renderHealthChart();
      });
    });

    loadHealthData();
  </script>
</body>
</html>
